<!DOCTYPE html>
<html lang="UA">

<header>
    <title>Створення таблиць</title>

</header>

<link rel="stylesheet" href="table.css">

<body>
    <p align="center">
       Середні характерстики
    </p>

    align="center"
    border="1" 
    сеllpadding="5" 
    сеllspacing="0">

        <td colspan="2">Характеристики</td>
    </tr>
    <tr align="center">
        <td>Середній зріст, см</td>
        <td>Середня вага, кг</td>
    </tr>
    <tr align="center">
        <td rowspan="2">Стать</td>
        <td>Чоловіча</td>
        <td>177</td>
        <td>73</td>
    </tr>
    <tr align="center">
        <td>Жіноча</td>
        <td>166</td>
        <td>65</td>
    </tr>

</table>

</body>
</html>
