<!DOCTYPE html>
<html lang="UA">

<header>
    <title>Створення таблиць</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale: 0,1">
</header>

<body>
<table align="center"
    border="1" 
    width="1500"
   > 

    <tr align="center">
        <td colspan="2"><font size="5">Заголовок</font></td>
    </tr>
    <tr valign="top" style="height:100px">
        <td align="left">Дані, вирівняні по лівому краю комірки</td>
        <td align="right">Дані, вирівняні по правому краю комірки</td>
    </tr>
    <tr style="height:75px">
        <td>25% ширини таблиці</td>
        <td width="75%">75% ширини таблиці</td>
    </tr>
    </table>

</body>
</html>
